<!DOCTYPE html>
<html lang="fr-FR">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        {% load static %}
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="https://unpkg.com/@webpixels/css@1.1.5/dist/index.css">
        <link rel="stylesheet" href="{% static 'css/style.css' %}" type="text/css">
        {% block stylesheets %}{% endblock stylesheets %}
        <title>Gestion de Stock: {% block title %} {% endblock title %}</title>

        <!-- Favicon -->
        <link rel="icon" href="{% static 'images/logo/favicon2.png' %}" type="image/png">

    </head>
    <body>
       <!-- Overlay pour mobile -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

        {% include "stock/sidebar.html" %}

        <section id="wrapper">
            <nav class="navbar navbar-expand-md bg-success">
                <div class="container-fluid mx-2">
                  <div class="navbar-header">
                    <!-- Bouton pour toggle le sidebar -->
                    <button id="sidebarToggleBtn" class="navbar-toggler me-2" type="button" aria-label="Toggle sidebar">
                        <i class="fa fa-bars text-white"></i>
                    </button>
                    <a class="navbar-brand" style="font-size: 20px;" href="{% url 'dashboard' %}">Gestion Stock<span class="text-warning">app</span></a>
                  </div>
                </div>
              </nav>
          {% block content%}
              
          {% endblock content%}
        </section>
        </div>
        <!-- Bootstrap core JavaScript-->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

        <!-- Core plugin JavaScript-->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

        <script src="{% static 'js/dashboard.js' %}"></script>

        {% block javascripts %}{% endblock javascripts %}
      </body>
</html>
