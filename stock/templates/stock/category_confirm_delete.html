{% extends 'stock/base.html' %}

{% block content %}
<div class="container m-3">
    <h2 class="mb-4">Suppression de la catégorie</h2>
    <div class="alert alert-warning" role="alert">
        <i class="fas fa-exclamation-triangle"></i>Etes-vous sûr de vouloir supprimer "{{ category.nom }}"?
    </div>
    <form method="post" class="mt-4">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">
            <i class="fas fa-check"></i> Confirmer
        </button>
        <a href="{% url 'category-list' %}" class="btn btn-secondary ms-2">
            <i class="fas fa-times"></i> Annuler
        </a>
    </form>
</div>
{% endblock %}
